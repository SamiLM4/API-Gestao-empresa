<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Funcionários - SamiAPI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="content">
    <div class="page-header">
      <h1>Funcionários</h1>
      <button class="btn-primary" onclick="openModal('modal-inserir')">
        <span>+ Adicionar Funcionário</span>
      </button>
    </div>

    <div class="table-container">
      <table id="funcionarios-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Email</th>
            <th>CPF</th>
            <th>Cargo</th>
            <th>Salário</th>
            <th>Data Contratação</th>
            <th>Departamento</th>
            <th>Supervisor</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Modal Editar -->
  <div class="modal-overlay" id="modal-editar">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Editar Funcionário</h2>
        <button class="close-btn" onclick="closeModal('modal-editar')">&times;</button>
      </div>
      <form id="edit-form">
        <div class="form-group"><label>Nome</label><input type="text" id="edit-nome" required /></div>
        <div class="form-group"><label>Email</label><input type="email" id="edit-email" required /></div>
        <div class="form-group"><label>CPF</label><input type="text" id="edit-cpf" required /></div>
        <div class="form-group"><label>Cargo</label><input type="text" id="edit-cargo" required /></div>
        <div class="form-group"><label>Salário</label><input type="number" id="edit-salario" /></div>
        <div class="form-group"><label>Data Contratação</label><input type="date" id="edit-data-contratacao" required /></div>
        <div class="form-group"><label>Departamento</label><input type="text" id="edit-departamento" /></div>
        <div class="form-group"><label>Supervisor</label><input type="text" id="edit-supervisor" /></div>
        <div class="form-actions">
            <button type="button" class="btn-secondary" onclick="closeModal('modal-editar')">Cancelar</button>
            <button type="submit" class="btn-primary">Salvar Alterações</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal Inserir -->
  <div class="modal-overlay" id="modal-inserir">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Inserir Novo Funcionário</h2>
        <button class="close-btn" onclick="closeModal('modal-inserir')">&times;</button>
      </div>
      <form id="inserir-form">
        <div class="form-group"><label>Nome</label><input type="text" id="novo-nome" required /></div>
        <div class="form-group"><label>Email</label><input type="email" id="novo-email" required /></div>
        <div class="form-group"><label>CPF</label><input type="text" id="novo-cpf" required /></div>
        <div class="form-group"><label>Cargo</label><input type="text" id="novo-cargo" required /></div>
        <div class="form-group"><label>Salário</label><input type="number" id="novo-salario" /></div>
        <div class="form-group"><label>Data Contratação</label><input type="date" id="novo-data-contratacao" required /></div>
        <div class="form-group"><label>Departamento</label><input type="text" id="novo-departamento" /></div>
        <div class="form-group"><label>Supervisor</label><input type="text" id="novo-supervisor" /></div>
        <div class="form-actions">
            <button type="button" class="btn-secondary" onclick="closeModal('modal-inserir')">Cancelar</button>
            <button type="submit" class="btn-primary">Cadastrar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="ui.js"></script>
  <script>
    function carregarDados() {
        const token = localStorage.getItem('token');
        if (token) {
            fetch('http://localhost:8080/funcionarios', {
                method: 'GET',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            })
            .then(response => response.json())
            .then(data => {
                if (Array.isArray(data) && data.length > 0) {
                    preencherTabela(data);
                } else {
                    showToast('Dados de funcionários não encontrados.', 'info');
                }
            })
            .catch(error => {
                showToast('Erro ao tentar buscar dados dos funcionários.', 'error');
            });
        }
    }

    function preencherTabela(funcionarios) {
      const tbody = document.querySelector('#funcionarios-table tbody');
      tbody.innerHTML = '';
      funcionarios.forEach(funcionario => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${funcionario.id}</td>
          <td>${funcionario.nome}</td>
          <td>${funcionario.email}</td>
          <td>${funcionario.cpf}</td>
          <td>${funcionario.cargo}</td>
          <td>${funcionario.salario ? funcionario.salario : '-'}</td>
          <td>${funcionario.data_contratacao}</td>
          <td>${funcionario.departamento ? funcionario.departamento : '-'}</td>
          <td>${funcionario.funcionario_supervisor ? funcionario.funcionario_supervisor : '-'}</td>
          <td>
            <div class="action-btns">
              <button class="btn-icon btn-edit" onclick="atualizarFuncionario(${funcionario.id})" title="Editar">✏️</button>
              <button class="btn-icon btn-delete" onclick="excluirFuncionario(${funcionario.id})" title="Excluir">🗑️</button>
            </div>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    function selecionarById(id) {
      return new Promise((resolve, reject) => {
        const token = localStorage.getItem('token');
        if (token) {
          fetch(`http://localhost:8080/funcionarios/${id}`, {
            method: 'GET',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          })
          .then(response => response.json())
          .then(data => {
            if (data.cod === 200) resolve(data.funcionario);
            else reject('Erro: ' + data.msg);
          })
          .catch(error => reject('Erro ao buscar dados do funcionário.'));
        }
      });
    }

    function atualizarFuncionario(id) {
      openModal('modal-editar');
      selecionarById(id).then(funcionario => {
        document.getElementById('edit-nome').value = funcionario.nome;
        document.getElementById('edit-email').value = funcionario.email;
        document.getElementById('edit-cpf').value = funcionario.cpf;
        document.getElementById('edit-cargo').value = funcionario.cargo;
        document.getElementById('edit-salario').value = funcionario.salario || '';
        document.getElementById('edit-data-contratacao').value = funcionario['data da contratacao'] || funcionario.data_contratacao || '';
        document.getElementById('edit-departamento').value = funcionario.departamento || '';
        document.getElementById('edit-supervisor').value = funcionario.supervisor || '';

        document.getElementById('edit-form').onsubmit = function (e) {
          e.preventDefault();
          const bodyData = {
              id: id,
              nome: document.getElementById('edit-nome').value,
              email: document.getElementById('edit-email').value,
              cpf: document.getElementById('edit-cpf').value,
              cargo: document.getElementById('edit-cargo').value,
              salario: document.getElementById('edit-salario').value,
              data_contratacao: document.getElementById('edit-data-contratacao').value,
              departamento: document.getElementById('edit-departamento').value,
              funcionario_supervisor: document.getElementById('edit-supervisor').value
          };
          const token = localStorage.getItem('token');
          fetch('http://localhost:8080/funcionarios', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify(bodyData)
          })
          .then(response => response.json())
          .then(data => {
            if (data.cod === 200) { 
              showToast('Funcionário atualizado com sucesso!', 'success');
              closeModal('modal-editar');
              carregarDados();
            } else showToast('Erro: ' + data.msg, 'error');
          })
          .catch(err => showToast('Erro ao atualizar os dados do funcionário.', 'error'));
        };
      }).catch(err => showToast(err, 'error'));
    }

    async function excluirFuncionario(id) {
      if(!confirm('Tem certeza que deseja excluir?')) return;
      const token = localStorage.getItem('token');
      if (token) {
        fetch(`http://localhost:8080/funcionarios/${id}`, { 
          method: 'DELETE',  
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        })
        .then(response => response.json())
        .then(data => {
          if (data.cod == 200) {
            showToast("Funcionário excluído com sucesso!", 'success');
            if(data.funcionarios) preencherTabela(data.funcionarios); 
            else carregarDados();
          } else showToast('Erro ao excluir: ' + data.cod, 'error');
        })
        .catch(error => showToast('Erro ao tentar excluir o funcionário.', 'error'));
      }
    }

    document.getElementById('inserir-form').addEventListener('submit', function (e) {
      e.preventDefault();
      const bodyData = {
          nome: document.getElementById('novo-nome').value,
          email: document.getElementById('novo-email').value,
          cpf: document.getElementById('novo-cpf').value,
          cargo: document.getElementById('novo-cargo').value,
          salario: document.getElementById('novo-salario').value,
          data_contratacao: document.getElementById('novo-data-contratacao').value,
          departamento: document.getElementById('novo-departamento').value,
          funcionario_supervisor: document.getElementById('novo-supervisor').value
      };
      const token = localStorage.getItem('token');
      if (token) {
        fetch('http://localhost:8080/funcionarios', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify(bodyData)
        })
        .then(response => response.json())
        .then(data => {
          if (data.cod === 201 || data.cod === 200) {
            showToast('Funcionário inserido com sucesso!', 'success');
            closeModal('modal-inserir');
            document.getElementById('inserir-form').reset();
            carregarDados();
          } else showToast('Erro ao inserir: ' + data.msg, 'error');
        })
        .catch(error => showToast('Erro ao tentar inserir o funcionário.', 'error'));
      }
    });

    carregarDados();
  </script>
</body>
</html>
