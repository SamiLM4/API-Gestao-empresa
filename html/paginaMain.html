<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - SamiAPI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="content">
    <div class="page-header">
      <h1>Dashboard Administrativo</h1>
    </div>
    
    <div class="dashboard-grid">
      <div class="card">
        <h2>Bem-vindo ao sistema!</h2>
        <p style="color: var(--text-muted); margin-top: 10px;">Use o menu acima para navegar pelas seções administrativas de funcionários, departamentos e muito mais.</p>
      </div>
      <div class="card">
        <h2>Relatórios Rápidos</h2>
        <p style="color: var(--text-muted); margin-top: 10px;">Acesse a aba de relatórios para ver estatísticas gerais sobre a empresa.</p>
        <button class="btn-primary" style="margin-top: 15px;" onclick="window.location.href='http://localhost:8080/html/dados.html'">Ver Relatórios</button>
      </div>
    </div>
  </div>

  <script src="ui.js"></script>
</body>
</html>
