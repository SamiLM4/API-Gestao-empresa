<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfis - SamiAPI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="content">
    <div class="page-header">
      <h1>Perfis</h1>
      <button class="btn-primary" onclick="mostrarFormularioAdicao()">
        <span>+ Adicionar Perfil</span>
      </button>
    </div>

    <div class="table-container">
      <table id="perfis-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>ID Funcionário</th>
            <th>Idade</th>
            <th>Endereço</th>
            <th>Telefone</th>
            <th>Gênero</th>
            <th>Estado Civil</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-form">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">Adicionar Perfil</h2>
        <button class="close-btn" onclick="closeModal('modal-form')">&times;</button>
      </div>
      <form id="edit-form">
        <div class="form-group"><label>ID Funcionário</label><input type="number" id="edit-id_funcionario" required /></div>
        <div class="form-group"><label>Idade</label><input type="number" id="edit-idade" required /></div>
        <div class="form-group"><label>Endereço</label><input type="text" id="edit-endereco" required /></div>
        <div class="form-group"><label>Telefone</label><input type="text" id="edit-telefone" required /></div>
        <div class="form-group"><label>Gênero</label><input type="text" id="edit-genero" /></div>
        <div class="form-group"><label>Estado Civil</label><input type="text" id="edit-estado_civil" required /></div>
        <div class="form-actions">
            <button type="button" class="btn-secondary" onclick="closeModal('modal-form')">Cancelar</button>
            <button type="submit" class="btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="ui.js"></script>
  <script>
    function carregarDados() {
        const token = localStorage.getItem('token');
        if (token) {
            fetch('http://localhost:8080/perfis', {
                method: 'GET',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
            })
            .then(response => response.json())
            .then(data => {
                if (data.cod === 200 && Array.isArray(data.perfis) && data.perfis.length > 0) {
                    preencherTabela(data.perfis);
                } else {
                    showToast('Não há perfis para exibir.', 'info');
                }
            })
            .catch(error => {
                showToast('Erro ao tentar buscar dados dos perfis.', 'error');
            });
        }
    }

    function preencherTabela(perfis) {
      const tbody = document.querySelector('#perfis-table tbody');
      tbody.innerHTML = '';
      perfis.forEach(perfil => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${perfil.id}</td>
          <td>${perfil.id_funcionario}</td>
          <td>${perfil.idade}</td>
          <td>${perfil.endereco}</td>
          <td>${perfil.telefone}</td>
          <td>${perfil.genero || 'Não informado'}</td>
          <td>${perfil.estado_civil}</td>
          <td>
            <div class="action-btns">
              <button class="btn-icon btn-edit" onclick="atualizarPerfil(${perfil.id})" title="Editar">✏️</button>
              <button class="btn-icon btn-delete" onclick="excluirPerfil(${perfil.id})" title="Excluir">🗑️</button>
            </div>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    function selecionarPerfilById(id) {
      return new Promise((resolve, reject) => {
        const token = localStorage.getItem('token');
        if (token) {
          fetch(`http://localhost:8080/perfis/${id}`, {
            method: 'GET',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
          })
          .then(response => response.json())
          .then(data => {
            if (data.cod === 200) resolve(data.perfil);
            else reject('Erro: ' + data.msg);
          })
          .catch(error => reject('Erro ao tentar buscar dados do perfil.'));
        }
      });
    }

    function mostrarFormularioAdicao() {
        document.getElementById('modal-title').innerText = 'Adicionar Perfil';
        document.getElementById('edit-form').reset();
        openModal('modal-form');

        document.getElementById('edit-form').onsubmit = function (e) {
            e.preventDefault();
            const bodyData = {
                id_funcionario: document.getElementById('edit-id_funcionario').value,
                idade: document.getElementById('edit-idade').value,
                endereco: document.getElementById('edit-endereco').value,
                telefone: document.getElementById('edit-telefone').value,
                genero: document.getElementById('edit-genero').value,
                estado_civil: document.getElementById('edit-estado_civil').value
            };

            const token = localStorage.getItem('token');
            if (token) {
                fetch('http://localhost:8080/perfis', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(bodyData)
                })
                .then(response => response.json())
                .then(data => {
                    if (data.cod === 201 || data.cod === 200) {
                        showToast('Perfil adicionado com sucesso!', 'success');
                        closeModal('modal-form');
                        carregarDados();
                    } else showToast('Erro ao adicionar: ' + data.msg, 'error');
                })
                .catch(error => showToast('Erro ao tentar adicionar perfil.', 'error'));
            }
        };
    }

    function atualizarPerfil(id) {
      document.getElementById('modal-title').innerText = 'Editar Perfil';
      openModal('modal-form');
      
      selecionarPerfilById(id).then(perfil => {
        document.getElementById('edit-id_funcionario').value = perfil.id_funcionario;
        document.getElementById('edit-idade').value = perfil.idade;
        document.getElementById('edit-endereco').value = perfil.endereco;
        document.getElementById('edit-telefone').value = perfil.telefone;
        document.getElementById('edit-genero').value = perfil.genero || '';
        document.getElementById('edit-estado_civil').value = perfil.estado_civil;

        document.getElementById('edit-form').onsubmit = function (e) {
          e.preventDefault();
          const bodyData = {
            id,
            id_funcionario: document.getElementById('edit-id_funcionario').value,
            idade: document.getElementById('edit-idade').value,
            endereco: document.getElementById('edit-endereco').value,
            telefone: document.getElementById('edit-telefone').value,
            genero: document.getElementById('edit-genero').value,
            estado_civil: document.getElementById('edit-estado_civil').value
          };
          const token = localStorage.getItem('token');
          fetch('http://localhost:8080/perfis', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify(bodyData)
          })
          .then(response => response.json())
          .then(data => {
            if (data.cod === 200) {
              showToast('Perfil atualizado com sucesso!', 'success');
              closeModal('modal-form');
              carregarDados();
            } else showToast('Erro: ' + data.msg, 'error');
          })
          .catch(error => showToast('Erro ao atualizar perfil.', 'error'));
        };
      }).catch(err => showToast(err, 'error'));
    }

    async function excluirPerfil(id) {
      if(!confirm('Tem certeza que deseja excluir?')) return;
      const token = localStorage.getItem('token');
      if (token) {
        fetch(`http://localhost:8080/perfis/${id}`, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
        })
        .then(response => response.json())
        .then(data => {
          if (data.cod === 200) {
            showToast("Perfil excluído com sucesso!", 'success');
            carregarDados();
          } else showToast('Erro: ' + data.msg, 'error');
        })
        .catch(error => showToast('Erro ao excluir perfil.', 'error'));
      }
    }

    carregarDados();
  </script>
</body>
</html>
