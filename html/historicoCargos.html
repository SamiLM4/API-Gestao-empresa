<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Histórico de Cargos - SamiAPI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="content">
    <div class="page-header">
      <h1>Histórico de Cargos</h1>
      <button class="btn-primary" onclick="mostrarFormularioAdicionar()">
        <span>+ Adicionar Histórico</span>
      </button>
    </div>

    <div class="table-container">
      <table id="historico-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>ID Func.</th>
            <th>Cargos Anteriores</th>
            <th>Cargo Atual</th>
            <th>Data Alteração</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-form">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">Adicionar Histórico</h2>
        <button class="close-btn" onclick="closeModal('modal-form')">&times;</button>
      </div>
      <form id="edit-form">
        <input type="hidden" id="edit-id" />
        <div class="form-group"><label>ID Funcionário</label><input type="number" id="edit-id_funcionario" required /></div>
        <div class="form-group"><label>Cargos Anteriores</label><input type="text" id="edit-cargos_anteriores" required /></div>
        <div class="form-group"><label>Cargo Atual</label><input type="text" id="edit-cargo_atual" required /></div>
        <div class="form-group"><label>Data Alteração</label><input type="date" id="edit-data_alteracao" required /></div>
        <div class="form-actions">
            <button type="button" class="btn-secondary" onclick="closeModal('modal-form')">Cancelar</button>
            <button type="submit" class="btn-primary" id="form-submit-btn">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="ui.js"></script>
  <script>
    function carregarHistoricos() {
      const token = localStorage.getItem('token');
      if (!token) return;

      fetch('http://localhost:8080/historicoCargos', {
        method: 'GET',
        headers: { 'Authorization': `Bearer ${token}` }
      })
      .then(response => response.json())
      .then(data => {
        if (data.cod === 200 && Array.isArray(data.historicoCargos)) {
          preencherTabela(data.historicoCargos);
        } else {
          showToast('Erro ao carregar históricos.', 'info');
        }
      })
      .catch(error => showToast('Erro ao carregar os dados.', 'error'));
    }

    function preencherTabela(historicos) {
      const tbody = document.querySelector('#historico-table tbody');
      tbody.innerHTML = '';
      historicos.forEach(h => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${h.id}</td>
          <td>${h.id_funcionario}</td>
          <td>${h.cargos_anteriores}</td>
          <td>${h.cargo_atual}</td>
          <td>${h.data_alteracao}</td>
          <td>
            <div class="action-btns">
              <button class="btn-icon btn-edit" onclick="atualizarHistorico(${h.id})" title="Editar">✏️</button>
              <button class="btn-icon btn-delete" onclick="excluirHistorico(${h.id})" title="Excluir">🗑️</button>
            </div>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    function selecionarHistoricoById(id) {
      return new Promise((resolve, reject) => {
        const token = localStorage.getItem('token');
        if (token) {
          fetch(`http://localhost:8080/historicoCargos/${id}`, {
            method: 'GET',
            headers: { 'Authorization': `Bearer ${token}` }
          })
          .then(resp => resp.json())
          .then(data => {
            if (data.cod === 200 && data.historico) resolve(data.historico);
            else reject('Histórico não encontrado.');
          })
          .catch(err => reject(err));
        }
      });
    }

    function mostrarFormularioAdicionar() {
      document.getElementById('modal-title').innerText = "Adicionar Histórico";
      document.getElementById('edit-form').reset();
      document.getElementById('edit-id').value = '';
      openModal('modal-form');

      document.getElementById('edit-form').onsubmit = function (e) {
        e.preventDefault();
        const token = localStorage.getItem('token');
        if (token) {
          fetch('http://localhost:8080/historicoCargos', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({
              id_funcionario: Number(document.getElementById('edit-id_funcionario').value),
              cargos_anteriores: document.getElementById('edit-cargos_anteriores').value,
              cargo_atual: document.getElementById('edit-cargo_atual').value,
              data_alteracao: document.getElementById('edit-data_alteracao').value
            })
          })
          .then(resp => resp.json())
          .then(data => {
            if (data.cod === 200 || data.cod === 201) {
              showToast('Histórico adicionado com sucesso!', 'success');
              closeModal('modal-form');
              carregarHistoricos();
            } else showToast('Erro: ' + data.msg, 'error');
          })
          .catch(error => showToast('Erro ao adicionar histórico.', 'error'));
        }
      };
    }

    function atualizarHistorico(id) {
      document.getElementById('modal-title').innerText = "Editar Histórico";
      openModal('modal-form');

      selecionarHistoricoById(id).then(h => {
        document.getElementById('edit-id').value = h.id;
        document.getElementById('edit-id_funcionario').value = h.id_funcionario;
        document.getElementById('edit-cargos_anteriores').value = h.cargos_anteriores;
        document.getElementById('edit-cargo_atual').value = h.cargo_atual;
        document.getElementById('edit-data_alteracao').value = h.data_alteracao;

        document.getElementById('edit-form').onsubmit = function (e) {
          e.preventDefault();
          const token = localStorage.getItem('token');
          if (token) {
            fetch('http://localhost:8080/historicoCargos', {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
              body: JSON.stringify({
                id: Number(document.getElementById('edit-id').value),
                id_funcionario: Number(document.getElementById('edit-id_funcionario').value),
                cargos_anteriores: document.getElementById('edit-cargos_anteriores').value,
                cargo_atual: document.getElementById('edit-cargo_atual').value,
                data_alteracao: document.getElementById('edit-data_alteracao').value
              })
            })
            .then(resp => resp.json())
            .then(data => {
              if (data.cod === 200) {
                showToast('Histórico atualizado com sucesso!', 'success');
                closeModal('modal-form');
                carregarHistoricos();
              } else showToast('Erro: ' + data.msg, 'error');
            })
            .catch(error => showToast('Erro ao atualizar histórico.', 'error'));
          }
        };
      }).catch(msg => showToast(msg, 'error'));
    }

    function excluirHistorico(id) {
      if (!confirm('Tem certeza que deseja excluir?')) return;
      const token = localStorage.getItem('token');
      if (token) {
        fetch(`http://localhost:8080/historicoCargos/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        })
        .then(resp => resp.json())
        .then(data => {
          if (data.cod === 200) {
            showToast('Histórico excluído com sucesso!', 'success');
            carregarHistoricos();
          } else showToast('Erro: ' + data.msg, 'error');
        })
        .catch(error => showToast('Erro ao excluir histórico.', 'error'));
      }
    }

    window.onload = carregarHistoricos;
  </script>
</body>
</html>
