<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Relatórios - SamiAPI</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .report-card {
        max-width: 600px;
        margin: 0 auto;
    }
    .result-box {
        margin-top: 30px;
        background: rgba(15, 23, 42, 0.5);
        padding: 20px;
        border-radius: 12px;
        border: 1px solid var(--border-color);
        display: none;
        animation: fadeIn 0.3s ease;
    }
    .result-box strong { color: var(--primary); }
    .stat-row {
        display: flex;
        justify-content: space-between;
        padding: 12px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .stat-row:last-child { border-bottom: none; }
  </style>
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="content">
    <div class="page-header">
      <h1>Relatórios</h1>
    </div>

    <div class="card report-card">
      <h2 style="margin-bottom: 20px;">Consultar Departamento</h2>
      <div class="form-group">
        <label>Selecione o Departamento</label>
        <select id="departamento">
            <option value="">Carregando...</option>
        </select>
      </div>
      <button class="btn-primary" onclick="buscarDados()" style="width: 100%; justify-content: center;">Buscar</button>

      <div id="resultado" class="result-box"></div>
    </div>
  </div>

  <script src="ui.js"></script>
  <script>
    function buscarDados() {
      const departamento = document.getElementById('departamento').value.trim();
      const resultadoDiv = document.getElementById('resultado');
      resultadoDiv.style.display = 'none';
      resultadoDiv.innerHTML = '';

      if (!departamento) {
        showToast('Por favor, digite o nome do departamento.', 'error');
        return;
      }

      const token = localStorage.getItem('token');
      if (!token) return;

      fetch('http://localhost:8080/dados', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ departamento })
      })
      .then(res => res.json())
      .then(data => {
        resultadoDiv.style.display = 'block';

        if (data.media_idade !== undefined && data.media_salario !== undefined && data.total_funcionarios !== undefined) {
          resultadoDiv.innerHTML = `
            <div style="font-size: 18px; margin-bottom: 15px; color: var(--success); font-weight: 600;">${data.msg}</div>
            <div class="stat-row">
                <span>Média de Idade</span>
                <strong>${data.media_idade} anos</strong>
            </div>
            <div class="stat-row">
                <span>Média Salarial</span>
                <strong>R$ ${data.media_salario}</strong>
            </div>
            <div class="stat-row">
                <span>Total de Funcionários</span>
                <strong>${data.total_funcionarios}</strong>
            </div>
          `;
        } else if (data.resultado) {
          resultadoDiv.innerHTML = `<p>${data.resultado}</p>`;
        } else if (data.msg) {
          resultadoDiv.innerHTML = `<p style="color: var(--danger);">${data.msg}</p>`;
        } else {
          resultadoDiv.innerHTML = `<p>Erro inesperado ao buscar os dados.</p>`;
        }
      })
      .catch(err => {
        showToast('Erro ao buscar relatório', 'error');
      });
    }

    function carregarDepartamentos() {
        const token = localStorage.getItem('token');
        if (!token) return;

        fetch('http://localhost:8080/departamentos', {
            method: 'GET',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
        })
        .then(response => response.json())
        .then(data => {
            const select = document.getElementById('departamento');
            select.innerHTML = '<option value="">Selecione um departamento</option>';
            if (Array.isArray(data) && data.length > 0) {
                data.forEach(dep => {
                    const option = document.createElement('option');
                    option.value = dep.nome_departamento;
                    option.textContent = dep.nome_departamento;
                    select.appendChild(option);
                });
            } else {
                select.innerHTML = '<option value="">Nenhum departamento encontrado</option>';
            }
        })
        .catch(error => {
            showToast('Erro ao carregar lista de departamentos.', 'error');
        });
    }

    window.onload = carregarDepartamentos;
  </script>
</body>
</html>
