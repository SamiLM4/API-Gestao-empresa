<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Departamentos - SamiAPI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="navbar-placeholder"></div>

  <div class="content">
    <div class="page-header">
      <h1>Departamentos</h1>
      <button class="btn-primary" onclick="mostrarFormularioAdicao()">
        <span>+ Adicionar Departamento</span>
      </button>
    </div>

    <div class="table-container">
      <table id="departamentos-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Orçamento</th>
            <th>Localização</th>
            <th>Data Criação</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Modal Adicionar / Editar -->
  <div class="modal-overlay" id="modal-form">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">Adicionar Departamento</h2>
        <button class="close-btn" onclick="closeModal('modal-form')">&times;</button>
      </div>
      <form id="edit-form">
        <div class="form-group"><label>Nome</label><input type="text" id="edit-nome_departamento" required /></div>
        <div class="form-group"><label>Orçamento</label><input type="number" step="0.01" id="edit-orcamento" required /></div>
        <div class="form-group"><label>Localização</label><input type="text" id="edit-localizacao" required /></div>
        <div class="form-group"><label>Data Criação</label><input type="date" id="edit-data_criacao" required /></div>
        <div class="form-actions">
            <button type="button" class="btn-secondary" onclick="closeModal('modal-form')">Cancelar</button>
            <button type="submit" class="btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="ui.js"></script>
  <script>
    function carregarDados() {
        const token = localStorage.getItem('token');
        if (token) {
            fetch('http://localhost:8080/departamentos', {
                method: 'GET',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
            })
            .then(response => response.json())
            .then(data => {
                if (Array.isArray(data) && data.length > 0) {
                    preencherTabela(data);
                } else {
                    showToast('Não há departamentos para exibir.', 'info');
                }
            })
            .catch(error => {
                showToast('Erro ao tentar buscar dados.', 'error');
            });
        }
    }

    function preencherTabela(departamentos) {
      const tbody = document.querySelector('#departamentos-table tbody');
      tbody.innerHTML = '';
      departamentos.forEach(departamento => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${departamento.id}</td>
          <td>${departamento.nome_departamento}</td>
          <td>${departamento.orcamento}</td>
          <td>${departamento.localizacao}</td>
          <td>${departamento.data_criacao}</td>
          <td>
            <div class="action-btns">
              <button class="btn-icon btn-edit" onclick="atualizarDepartamento(${departamento.id})" title="Editar">✏️</button>
              <button class="btn-icon btn-delete" onclick="excluirDepartamento(${departamento.id})" title="Excluir">🗑️</button>
            </div>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    function selecionarDepartamentoById(id) {
      return new Promise((resolve, reject) => {
        const token = localStorage.getItem('token');
        if (token) {
          fetch(`http://localhost:8080/departamentos/${id}`, {
            method: 'GET',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
          })
          .then(response => response.json())
          .then(data => {
            if (data.cod === 200) resolve(data.departamento);
            else reject('Erro: ' + data.msg);
          })
          .catch(error => reject('Erro ao buscar dados do departamento.'));
        }
      });
    }

    function mostrarFormularioAdicao() {
        document.getElementById('modal-title').innerText = 'Adicionar Departamento';
        document.getElementById('edit-form').reset();
        openModal('modal-form');

        document.getElementById('edit-form').onsubmit = function (e) {
            e.preventDefault();
            const bodyData = {
                nome_departamento: document.getElementById('edit-nome_departamento').value,
                orcamento: document.getElementById('edit-orcamento').value,
                localizacao: document.getElementById('edit-localizacao').value,
                data_criacao: document.getElementById('edit-data_criacao').value
            };

            const token = localStorage.getItem('token');
            if (token) {
                fetch('http://localhost:8080/departamentos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(bodyData)
                })
                .then(response => response.json())
                .then(data => {
                    if (data.cod === 201 || data.cod === 200) {
                        showToast('Departamento adicionado com sucesso!', 'success');
                        closeModal('modal-form');
                        carregarDados();
                    } else showToast('Erro ao adicionar: ' + data.msg, 'error');
                })
                .catch(error => showToast('Erro ao adicionar departamento.', 'error'));
            }
        };
    }

    function atualizarDepartamento(id) {
      document.getElementById('modal-title').innerText = 'Editar Departamento';
      openModal('modal-form');
      
      selecionarDepartamentoById(id).then(departamento => {
        document.getElementById('edit-nome_departamento').value = departamento.nome_departamento;
        document.getElementById('edit-orcamento').value = departamento.orcamento;
        document.getElementById('edit-localizacao').value = departamento.localizacao;
        document.getElementById('edit-data_criacao').value = departamento.data_criacao;

        document.getElementById('edit-form').onsubmit = function (e) {
          e.preventDefault();
          const bodyData = {
            id,
            nome_departamento: document.getElementById('edit-nome_departamento').value,
            orcamento: document.getElementById('edit-orcamento').value,
            localizacao: document.getElementById('edit-localizacao').value,
            data_criacao: document.getElementById('edit-data_criacao').value
          };
          const token = localStorage.getItem('token');
          fetch('http://localhost:8080/departamentos', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify(bodyData)
          })
          .then(response => response.json())
          .then(data => {
            if (data.cod === 200) {
              showToast('Departamento atualizado com sucesso!', 'success');
              closeModal('modal-form');
              carregarDados();
            } else showToast('Erro: ' + data.msg, 'error');
          })
          .catch(error => showToast('Erro ao atualizar departamento.', 'error'));
        };
      }).catch(err => showToast(err, 'error'));
    }

    async function excluirDepartamento(id) {
      if(!confirm('Tem certeza que deseja excluir?')) return;
      const token = localStorage.getItem('token');
      if (token) {
        fetch(`http://localhost:8080/departamentos/${id}`, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
        })
        .then(response => response.json())
        .then(data => {
          if (data.cod === 200) {
            showToast("Departamento excluído com sucesso!", 'success');
            carregarDados();
          } else showToast('Erro: ' + data.msg, 'error');
        })
        .catch(error => showToast('Erro ao excluir departamento.', 'error'));
      }
    }

    carregarDados();
  </script>
</body>
</html>
