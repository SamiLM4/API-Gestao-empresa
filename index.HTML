<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>SamiAPI - Login</title>
    <link rel="stylesheet" href="http://localhost:8080/html/styles.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <h2>SamiAPI Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" required placeholder="admin@empresa.com">
                </div>
                <div class="form-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" maxlength="14" required placeholder="000.000.000-00">
                </div>
                <button type="submit" class="btn-primary login-btn">Entrar</button>
            </form>
            <div style="margin-top: 20px; font-size: 13px; color: var(--text-muted);">
                Sistema de Gestão de Funcionários © 2025
            </div>
        </div>
    </div>
    
    <script src="http://localhost:8080/html/ui.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const cpf = document.getElementById('cpf').value;

            fetch('http://localhost:8080/funcionarios/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, cpf })
            })
            .then(response => response.json())
            .then(data => {
                if (data.cod === 200) {
                    localStorage.setItem('token', data.token);
                    showToast('Login realizado com sucesso!', 'success');
                    setTimeout(() => {
                        window.location.href = 'http://localhost:8080/html/paginaMain.html';
                    }, 1000);
                } else {
                    showToast('Erro no login: ' + data.msg, 'error');
                }
            })
            .catch(error => {
                console.error('Erro ao fazer login:', error);
                showToast('Erro ao tentar realizar o login.', 'error');
            });
        });
    </script>
</body>
</html>
